<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CaféUCol</title>

    <!-- PWA Meta -->
    <meta name="application-name" content="CaféUCol" />
    <meta name="description" content="Cafetería universitaria UCOL — pide tu comida y recógela sin filas" />
    <meta name="theme-color" content="#3E2212" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CaféUCol" />

    <!-- Manifest -->
    <link rel="manifest" href="/cafeteria-ucol/manifest.json" />

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/cafeteria-ucol/icon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/cafeteria-ucol/icon-16x16.png" />
    <link rel="apple-touch-icon" href="/cafeteria-ucol/apple-touch-icon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/cafeteria-ucol/sw.js')
            .then(reg => console.log('SW registrado:', reg.scope))
            .catch(err => console.warn('SW error:', err));
        });
      }
    </script>
  </body>
</html>
